server {
    listen 443 ssl;
    server_name chat.reminixauto.com;

    ssl_certificate     /etc/letsencrypt/live/chat.reminixauto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.reminixauto.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 55M;

    root  /opt/webchat/frontend;
    index index.html;

    # SSE streams — no buffering, long-lived connections
    location ~ ^/api/(events|admin/metrics)/stream$ {
        proxy_pass http://127.0.0.1:7361;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache     off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Backend REST API
    location /api/ {
        proxy_pass http://127.0.0.1:7361;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Uploaded files
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:7361;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker — must never be cached (browsers check for updates on every load)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name chat.reminixauto.com;
    return 301 https://$host$request_uri;
}
