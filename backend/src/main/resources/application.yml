spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  mvc:
    async:
      request-timeout: 3600000

  datasource:
    url: jdbc:postgresql://localhost:5433/webchat
    username: webchat
    password: webchat_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/css,application/javascript
    min-response-size: 512

app:
  upload:
    dir: uploads
  jwt:
    secret: "8f83b16db8816c148e6583d735071f0088dc577777bbda1a5b82877a5e848694a5309d4c"
    access-token-expiration: 900000   # 15 minutes
    refresh-token-expiration: 604800000 # 7 days
  cors:
    allowed-origins: "http://localhost:5173"
  admin:
    root-username: dimasik

vapid:
  public-key: "BDBsueMyGpOoRpFbNZyukPcqyPVFtaq26O3KQCstlch62QsyTojbbHh-Qka76M20q_4EOxZdmY4yA5Izk9gRzCg"
  private-key: "NmQH7rTYCVln5M-GWRukUWUgGlcoTgKs6BQXxvg7fhs"
  subject: "mailto:admin@webchat.local"

livekit:
  url: ws://localhost:7880
  api-key: devkey
  api-secret: devsecretkeyforlivekitminimum32ch

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.webchat: DEBUG
  file:
    name: logs/webchat.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
