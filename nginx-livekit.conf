server {
    listen 443 ssl;
    server_name livekit.reminixauto.com;

    ssl_certificate     /etc/letsencrypt/live/livekit.reminixauto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.reminixauto.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # LiveKit WebSocket + HTTP signaling
    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

server {
    listen 80;
    server_name livekit.reminixauto.com;
    return 301 https://$host$request_uri;
}
