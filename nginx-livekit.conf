server {
    listen 443 ssl;
    server_name livekit.reminixauto.com;

    ssl_certificate     /etc/letsencrypt/live/livekit.reminixauto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.reminixauto.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  'https://chat.reminixauto.com' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  'https://chat.reminixauto.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_set_header Host                $host;
        proxy_set_header Origin              $http_origin;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

server {
    listen 80;
    server_name livekit.reminixauto.com;
    return 301 https://$host$request_uri;
}
