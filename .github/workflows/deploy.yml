name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build backend ──────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw package -DskipTests -q

      # ── Build frontend ─────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── Deploy to server ───────────────────────────────────────────
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "backend/target/webchat-backend-0.0.1-SNAPSHOT.jar,frontend/dist,ecosystem.config.js,nginx.conf"
          target: /opt/webchat/upload

      - name: Restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # Перекладываем артефакты
            cp /opt/webchat/upload/backend/target/webchat-backend-0.0.1-SNAPSHOT.jar \
               /opt/webchat/webchat-backend.jar
            rsync -a --delete /opt/webchat/upload/frontend/dist/ /opt/webchat/frontend/
            cp /opt/webchat/upload/ecosystem.config.js /opt/webchat/
            sudo cp /opt/webchat/upload/nginx.conf /etc/nginx/sites-available/webchat
            sudo ln -sf /etc/nginx/sites-available/webchat /etc/nginx/sites-enabled/webchat
            sudo nginx -t && sudo systemctl reload nginx

            # Убедимся что dotenv установлен (нужен для ecosystem.config.js)
            npm list -g dotenv &>/dev/null || npm install -g dotenv

            # Рестарт PM2
            cd /opt/webchat
            pm2 startOrRestart ecosystem.config.js --env production
            pm2 save

            echo "✓ Deploy complete"
