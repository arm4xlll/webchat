name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build backend ─────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw package -DskipTests -q

      # ── Build frontend ────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── Upload artefacts to server ────────────────────────────────────
      - name: Copy artefacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "backend/target/webchat-backend-0.0.1-SNAPSHOT.jar,frontend/dist,ecosystem.config.js,nginx.conf,nginx-livekit.conf,scripts/provision.sh"
          target: /opt/webchat/upload

      # ── Deploy & restart services ─────────────────────────────────────
      - name: Deploy & restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            UPLOAD=/opt/webchat/upload
            APP=/opt/webchat

            echo "--- [1/5] Move artefacts ---"
            cp "$UPLOAD/backend/target/webchat-backend-0.0.1-SNAPSHOT.jar" \
               "$APP/webchat-backend.new.jar"
            mv "$APP/webchat-backend.new.jar" "$APP/webchat-backend.jar"

            rsync -a --delete "$UPLOAD/frontend/dist/" "$APP/frontend/"

            cp "$UPLOAD/ecosystem.config.js" "$APP/"

            echo "--- [2/5] Reload nginx ---"
            sudo cp "$UPLOAD/nginx.conf"         /etc/nginx/sites-available/webchat
            sudo cp "$UPLOAD/nginx-livekit.conf"  /etc/nginx/sites-available/livekit
            sudo ln -sf /etc/nginx/sites-available/webchat /etc/nginx/sites-enabled/webchat
            sudo ln -sf /etc/nginx/sites-available/livekit /etc/nginx/sites-enabled/livekit
            sudo nginx -t
            sudo systemctl reload nginx

            echo "--- [3/5] Ensure dirs exist ---"
            mkdir -p "$APP/uploads"

            echo "--- [3.5/5] Ensure LiveKit config has Redis with port ---"
            if ! sudo grep -q "address: localhost:6379" /etc/livekit/livekit.yaml 2>/dev/null; then
              if sudo grep -q "^redis:" /etc/livekit/livekit.yaml 2>/dev/null; then
                sudo sed -i 's|address: localhost$|address: localhost:6379|' /etc/livekit/livekit.yaml
                echo "Redis address fixed (added missing port)"
              else
                printf '\nredis:\n  address: localhost:6379\n' \
                  | sudo tee -a /etc/livekit/livekit.yaml > /dev/null
                echo "Redis added to LiveKit config"
              fi
            else
              echo "Redis config OK"
            fi
            # Reset PM2 restart counter — LiveKit may have hit max_restarts
            pm2 reset livekit 2>/dev/null || true

            echo "--- [4/5] Restart services via PM2 ---"
            cd "$APP"
            set -a; source "$APP/.env"; set +a
            pm2 startOrRestart ecosystem.config.js --update-env
            pm2 save

            echo "--- [5/5] Health check (up to 60 s) ---"
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                         --max-time 4 http://localhost:7361/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy after $((i * 5)) s"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "ERROR: backend did not become healthy within 60 s (last HTTP $STATUS)"
                echo "=== Last 40 log lines ==="
                tail -40 /var/log/webchat/pm2-error.log || true
                pm2 list
                exit 1
              fi
              echo "  waiting... ($i/12, last HTTP $STATUS)"
              sleep 5
            done

            echo "Deploy complete"
